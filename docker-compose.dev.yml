# ─────────────────────────────────────────────────────────────────────────────
# BMatx portal — DEV stack (hot reload).
# Source is bind-mounted; node_modules/.next live in named volumes so the host's
# (Windows) binaries never leak into the Linux container.
#
#   docker compose -f docker-compose.dev.yml up         # http://localhost:3000
#   docker compose -f docker-compose.dev.yml down
#   docker compose -f docker-compose.dev.yml down -v     # also drop node_modules cache
#
# First `up` installs deps inside the container (slower); later ups reuse the
# bmatx_node_modules volume. To force a clean reinstall: `down -v` then `up`.
# ─────────────────────────────────────────────────────────────────────────────
services:
  web:
    image: node:20-alpine
    container_name: bmatx-portal-dev
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- -H 0.0.0.0 -p 3000"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      # Windows/Docker-Desktop bind mounts don't propagate inotify — poll instead.
      - WATCHPACK_POLLING=true
      # --- TLS-intercepting network (the dev machine) only. Remove on a normal net. ---
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - NPM_CONFIG_STRICT_SSL=false
    volumes:
      - .:/app
      - bmatx_node_modules:/app/node_modules
      - bmatx_next:/app/.next

volumes:
  bmatx_node_modules:
  bmatx_next:
