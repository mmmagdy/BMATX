# ─────────────────────────────────────────────────────────────────────────────
# BMatx portal — DEMO/server stack (3men-production).
# Self-contained production build (Dockerfile: npm ci + next build inside the
# image). Server has a normal network, so the full build works — no prebuilt
# artifact needed.
#
#   cd /srv/bmatx
#   git pull
#   docker compose -f docker-compose.demo.yml up -d --build
#   docker compose -f docker-compose.demo.yml logs -f
#
# Published on 127.0.0.1:3200 ONLY — host nginx fronts it (vhost → this port).
# Not exposed to the internet directly. Pick another port if 3200 is taken.
# ─────────────────────────────────────────────────────────────────────────────
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: bmatx-portal:demo
    container_name: bmatx-portal
    ports:
      - "127.0.0.1:3200:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
