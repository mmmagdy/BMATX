services:
  web:
    build:
      context: .
      # Offline image — packages the locally-built standalone artifact.
      # Run `npm run build` first. Works behind TLS-proxies / air-gapped.
      # For a self-contained build on a normal network, use `dockerfile: Dockerfile`.
      dockerfile: Dockerfile.prebuilt
    image: bmatx-portal
    container_name: bmatx-portal
    ports:
      # host 3200 -> container 3000 (host 3000 is used by another local stack)
      - "3200:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
